name: dockyard

services:
  api:
    build:
      context: .
      target: runtime
    image: dockyard-api:local
    ports:
      - "${DOCKYARD_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    init: true
